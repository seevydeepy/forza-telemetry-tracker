<li>Feedback Worker owns the remote Cloudflare Worker and D1 intake; backend owns local validation, diagnostics, queueing, and retry.</li>
<li>FH6 Map Tile Converter owns converter internals under <code>tools/fh6-map-tile-converter/</code>; backend owns invocation, cache metadata, settings, and tile serving.</li>

<template data-doc-path="solution.md">
<h2 id="purpose">Purpose</h2>
<p>Python FastAPI desktop backend for local UDP telemetry capture, SQLite storage, lap/session analysis, export, replay, update checks, feedback submission, and FH6 world-map integration.</p>
<h2 id="owned-paths">Owned Paths</h2>
<ul>
<li>telemetry_tracker/</li>
<li>tests/</li>
<li>tools/run-telemetry-tracker.py</li>
<li>tools/capture-data-out.py</li>
<li>tools/capture-session.py</li>
<li>tools/parse-data-out.py</li>
<li>tools/maintain-telemetry-db.py</li>
<li>requirements-telemetry-tracker.txt</li>
<li>requirements-telemetry-desktop.txt</li>
<li>requirements-telemetry-test.txt</li>
</ul>
<h2 id="entrypoints">Entrypoints</h2>
<ul>
<li><code>telemetry_tracker/app.py</code> exposes <code>create_app()</code> and the FastAPI routes for status, capture control, sessions, laps, replay/import, export jobs, feedback, diagnostics, update checks, track profiles, and world-map APIs.</li>
<li><code>telemetry_tracker/app.py</code> <code>CapturePipeline</code> wires raw packets through packet decoding, capture state, lap detection, storage, analysis, and live event publication.</li>
<li><code>telemetry_tracker/desktop_launcher.py</code> starts the packaged Windows desktop app: allocates the local HTTP port, starts the backend, resolves UDP port conflicts, opens pywebview, and exposes native file/folder selection.</li>
<li><code>tools/run-telemetry-tracker.py</code> is the development HTTP entrypoint for Uvicorn plus optional UDP listener startup.</li>
<li><code>tools/capture-data-out.py</code>, <code>tools/capture-session.py</code>, and <code>tools/parse-data-out.py</code> are raw FH Data Out capture/session/parse utilities.</li>
<li><code>tools/maintain-telemetry-db.py</code> prunes eligible non-race samples, checkpoints WAL, and optionally VACUUMs the SQLite database.</li>
</ul>
<h2 id="neighbouring-systems">Neighbouring Systems</h2>
<ul>
<li>Web Dashboard (<code>web/telemetry-tracker/</code>) consumes these REST/SSE APIs, mounted static assets, and pywebview bridge selections.</li>
<li>Feedback Worker receives reports submitted by the backend feedback client; backend owns local validation, diagnostics collection, queueing, and retry.</li>
<li>FH6 Map Tile Converter is called from the world-map cache path; backend owns cache status, settings, tile serving, and converter invocation.</li>
<li>Release, CI, and Packaging owns PyInstaller/Inno/metadata packaging around the backend launcher, requirements, and smoke checks.</li>
</ul>
<h2 id="key-internal-files">Key Internal Files</h2>
<ul>
<li><code>telemetry_tracker/storage.py</code>: SQLite schema, migrations, settings, sessions, laps, samples, track profiles, world-map records, feedback queue, and maintenance helpers.</li>
<li><code>telemetry_tracker/udp_listener.py</code>: async UDP socket lifecycle, packet-size validation, status events, and packet handler dispatch.</li>
<li><code>telemetry_tracker/packet_bridge.py</code> and <code>telemetry_tracker/data_out/</code>: FH Data Out packet schema, decoding, test encoding, raw packet iteration, capture summaries, and CSV/artifact writing.</li>
<li><code>telemetry_tracker/capture.py</code>, <code>lap_detection.py</code>, <code>lap_quality.py</code>, <code>ingest.py</code>: live capture state, auto/manual lap/session handling, quality decisions, and recent-sample ingestion.</li>
<li><code>telemetry_tracker/analysis.py</code>, <code>comparison.py</code>, <code>track_matcher.py</code>, <code>track_profiles.py</code>, <code>track_assets.py</code>: lap analysis, reference/ghost/delta data, track matching, route signatures, and uploaded track assets.</li>
<li><code>telemetry_tracker/export.py</code>, <code>replay.py</code>, <code>feedback.py</code>, <code>diagnostics.py</code>, <code>app_updates.py</code>, <code>world_map.py</code>: export/import jobs, raw replay, feedback, diagnostics, update checks, and map tile cache support.</li>
</ul>
<h2 id="maintenance-notes">Maintenance Notes</h2>
<ul>
<li>Keep this page focused on stable ownership, entrypoints, and contracts.</li>
<li>Use <code>routing.md</code> for symptom/search routing details.</li>
<li>Use the focused <code>tests/test_tracker_*.py</code> or <code>tests/test_capture_tool.py</code> file that matches the touched backend module or tool; broad backend changes normally route through <code>pytest tests</code>.</li>
</ul>
</template>

      "type": "RoutingGuide"
    },
    {
      "description": "",
      "metadata": {},
      "outgoing": [],
      "path": "solution.md",
      "search": "solution.md desktop backend  solutionguide",
      "tags": [],
      "title": "Desktop Backend",
      "type": "SolutionGuide"
    },
    {
      "description": "",
      "metadata": {},
      "outgoing": [],
      "path": "log.md",
      "search": "log.md desktop backend okf log  log",
      "tags": [],
      "title": "Desktop Backend OKF Log",
      "type": "Log"
    }
  ],
  "links": [
    {
      "source": "index.md",
      "target": "log.md"
    },
    {
      "source": "index.md",
      "target": "routing.md"
    },
    {
      "source": "index.md",
      "target": "routing_guidance.card"
    },
    {
      "source": "index.md",
      "target": "solution.md"
    }
  ],
  "name": "Desktop Backend OKF Wiki",
  "stats": {
    "docs": 5,
    "links": 4
  }
}
</script>
<script>
(() => {
  "use strict";
  const bundle = JSON.parse(document.getElementById("okf-data").textContent);
  const docs = bundle.docs;
  const docsByPath = new Map(docs.map((doc) => [doc.path, doc]));
  const docTemplates = new Map(
    [...document.querySelectorAll("template[data-doc-path]")].map((template) => [template.dataset.docPath, template])
  );
  const article = document.getElementById("article");
  const docList = document.getElementById("docList");
  const search = document.getElementById("search");
  const typeFilter = document.getElementById("typeFilter");
  const stats = document.getElementById("stats");

  stats.textContent = `${bundle.stats.docs} docs - ${bundle.stats.links} internal links - single-file OKF reader`;

  for (const type of [...new Set(docs.map((doc) => doc.type))].sort((a, b) => a.localeCompare(b))) {
    const option = document.createElement("option");
    option.value = type;
    option.textContent = type;
    typeFilter.appendChild(option);
  }

  function parseHash() {
    const hash = decodeURIComponent(window.location.hash || "");
    if (!hash.startsWith("#doc/")) return { path: "index.md", anchor: "" };
    const payload = hash.slice(5);
    const split = payload.indexOf("#");
    if (split < 0) return { path: payload || "index.md", anchor: "" };
    return { path: payload.slice(0, split) || "index.md", anchor: payload.slice(split + 1) };
  }

  function docHref(path, anchor = "") {
    const encoded = encodeURIComponent(path).replace(/%2F/g, "/");
    return `#doc/${encoded}${anchor ? `#${encodeURIComponent(anchor)}` : ""}`;
  }

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[ch]));
  }

  function renderList() {
    const needle = search.value.trim().toLowerCase();
    const selectedType = typeFilter.value;
    const { path: activePath } = parseHash();
    const filtered = docs.filter((doc) => {
      return (!selectedType || doc.type === selectedType) && (!needle || doc.search.includes(needle));
    });
    docList.innerHTML = filtered.map((doc) => `
      <a class="doc-link ${doc.path === activePath ? "active" : ""}" href="${docHref(doc.path)}">
        <strong>${escapeHtml(doc.title)}</strong>
        <span>${escapeHtml(doc.path)} - ${escapeHtml(doc.type)}</span>
      </a>
    `).join("") || `<p class="empty">No matching wiki pages.</p>`;
  }

  function linkPills(paths, emptyText) {
    if (!paths || paths.length === 0) return `<p class="empty">${escapeHtml(emptyText)}</p>`;
    return `<div class="link-row">${paths.map((path) => {
      const doc = docsByPath.get(path);
      const label = doc ? doc.title : path;
      return `<a class="pill" href="${docHref(path)}">${escapeHtml(label)}</a>`;
    }).join("")}</div>`;
  }

  function listValue(value) {
    if (Array.isArray(value)) return value.filter((item) => String(item || "").trim());
    if (typeof value === "string" && value.trim()) return [value.trim()];
    return [];
  }

  function renderRouteList(label, values) {
    if (!values.length) return "";
    return `
      <section>
        <strong>${escapeHtml(label)}</strong>
        <ul class="route-list">
          ${values.map((value) => `<li><code>${escapeHtml(value)}</code></li>`).join("")}
        </ul>
      </section>
    `;
  }

  function renderRouting(metadata) {
    const sections = [
      renderRouteList("Start here", listValue(metadata.routing_primary)),
      renderRouteList("Usually also inspect", listValue(metadata.routing_related)),
      renderRouteList("Keywords", listValue(metadata.routing_keywords)),
      renderRouteList("Runbooks / references", listValue(metadata.routing_runbooks))
    ].filter(Boolean);
    if (!sections.length) return "";
    return `
      <section class="routing-panel" aria-label="Agent routing">
        <h3>Agent routing</h3>
        <div class="routing-grid">${sections.join("")}</div>
      </section>
    `;
  }

  function renderArticle() {
    const { path, anchor } = parseHash();
    const doc = docsByPath.get(path) || docsByPath.get("index.md") || docs[0];
    if (!doc) {
      article.innerHTML = `<h2>No wiki documents found</h2>`;
      return;
    }
    document.title = `${doc.title} - ${bundle.name}`;
    const tagBadges = (doc.tags || []).map((tag) => `<span class="badge">#${escapeHtml(tag)}</span>`).join("");
    const metadata = Object.entries(doc.metadata || {})
      .filter(([key]) => !["title", "description", "tags"].includes(key) && !key.startsWith("routing_"))
      .map(([key, value]) => `<span class="badge">${escapeHtml(key)}: ${escapeHtml(Array.isArray(value) ? value.join(", ") : value)}</span>`)
      .join("");
    article.innerHTML = `
      <header class="article-header">
        <div class="badges"><span class="badge">${escapeHtml(doc.type)}</span>${tagBadges}${metadata}</div>
        <h2>${escapeHtml(doc.title)}</h2>
        ${doc.description ? `<p>${escapeHtml(doc.description)}</p>` : ""}
        <div class="source-link">Source path: ${escapeHtml(doc.path)}</div>
        ${renderRouting(doc.metadata || {})}
      </header>
      <section class="article-body"></section>
      <section class="relationships" aria-label="OKF relationships">
        <h3>Links from this page</h3>
        ${linkPills(doc.outgoing, "No internal OKF links from this page.")}
        <h3>Cited by</h3>
        ${linkPills(bundle.backlinks[doc.path] || [], "No other wiki page links here yet.")}
      </section>
    `;
    const body = article.querySelector(".article-body");
    const template = docTemplates.get(doc.path);
    if (body && template) {
      body.replaceChildren(template.content.cloneNode(true));
    } else if (body) {
      body.textContent = "Document body unavailable.";
    }
    renderList();
    if (anchor) {
      requestAnimationFrame(() => {
        const target = document.getElementById(anchor);
        if (target) target.scrollIntoView({ block: "start" });
      });
    }
  }

  document.addEventListener("click", (event) => {
    const link = event.target.closest("a[data-doc-link]");
    if (!link) return;
    event.preventDefault();
    window.location.hash = docHref(link.dataset.docLink, link.dataset.docAnchor || "");
  });
  search.addEventListener("input", renderList);
  typeFilter.addEventListener("change", renderList);
  window.addEventListener("hashchange", renderArticle);
  renderList();
  renderArticle();
})();
</script>
</body>
</html>
