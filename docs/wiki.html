      "html": "<h2 id=\"read-this-when\">Read This When<\/h2>\n<ul>\n<li>A change touches <code>web/telemetry-tracker/<\/code>.<\/li>\n<li>A symptom appears in the desktop embedded web UI, Vite dev UI, telemetry canvas, dashboard widgets, modals, import/export flows, or pywebview picker handling.<\/li>\n<li>A frontend error mentions <code>/api/*<\/code>, <code>/events<\/code>, <code>EventSource<\/code>, <code>pywebview<\/code>, Svelte, Vite, Vitest, canvas rendering, route review, or dashboard playback.<\/li>\n<\/ul>\n<h2 id=\"first-files-to-inspect\">First Files To Inspect<\/h2>\n<ul>\n<li><code>web/telemetry-tracker/src/App.svelte<\/code> for workflow state, API orchestration, SSE connection, live/replay mode, modals, and top-level composition.<\/li>\n<li><code>web/telemetry-tracker/src/api.ts<\/code> for endpoint names, request bodies, response types, and error messages.<\/li>\n<li><code>web/telemetry-tracker/src/types.ts<\/code> for frontend payload shape expectations.<\/li>\n<li><code>web/telemetry-tracker/src/desktopBridge.ts<\/code> for native file/folder picker availability and normalisation.<\/li>\n<li><code>web/telemetry-tracker/src/TelemetryCanvas.svelte<\/code> for route rendering, overlays, markers, ghosts, track assets, world-map tiles, pan/zoom, and point selection.<\/li>\n<li><code>web/telemetry-tracker/src/TelemetryDashboard.svelte<\/code> and <code>web/telemetry-tracker/src/Dashboard*.svelte<\/code> for dashboard widget display.<\/li>\n<li><code>web/telemetry-tracker/vite.config.ts<\/code> and <code>web/telemetry-tracker/package.json<\/code> for frontend build/test/dev-server issues.<\/li>\n<\/ul>\n<h2 id=\"owned-paths\">Owned Paths<\/h2>\n<ul>\n<li><code>web/telemetry-tracker/<\/code><\/li>\n<\/ul>\n<h2 id=\"symptoms-and-search-terms\">Symptoms And Search Terms<\/h2>\n<ul>\n<li>Blank or stale UI: <code>main.ts<\/code>, <code>App.svelte<\/code>, <code>recoverAndConnect<\/code>, <code>fetchStatus<\/code>, <code>fetchRecentLiveSamples<\/code>, <code>       "html": "<h2 id=\"purpose\">Purpose<\/h2>\n<p>Python FastAPI desktop backend for local UDP telemetry capture, SQLite storage, lap/session analysis, export, replay, update checks, feedback submission, and FH6 world-map integration.<\/p>\n<h2 id=\"owned-paths\">Owned Paths<\/h2>\n<ul>\n<li>telemetry_tracker/<\/li>\n<li>tests/<\/li>\n<li>tools/run-telemetry-tracker.py<\/li>\n<li>tools/capture-data-out.py<\/li>\n<li>tools/capture-session.py<\/li>\n<li>tools/parse-data-out.py<\/li>\n<li>tools/maintain-telemetry-db.py<\/li>\n<li>requirements-telemetry-tracker.txt<\/li>\n<li>requirements-telemetry-desktop.txt<\/li>\n<li>requirements-telemetry-test.txt<\/li>\n<\/ul>\n<h2 id=\"entrypoints\">Entrypoints<\/h2>\n<ul>\n<li><code>telemetry_tracker/app.py<\/code> exposes <code>create_app()<\/code> and the FastAPI routes for status, capture control, sessions, laps, replay/import, export jobs, feedback, diagnostics, update checks, track profiles, and world-map APIs.<\/li>\n<li><code>telemetry_tracker/app.py<\/code> <code>CapturePipeline<\/code> wires raw packets through packet decoding, capture state, lap detection, storage, analysis, and live event publication.<\/li>\n<li><code>telemetry_tracker/desktop_launcher.py<\/code> starts the packaged Windows desktop app: allocates the local HTTP port, starts the backend, resolves UDP port conflicts, opens pywebview, and exposes native file/folder selection.<\/li>\n<li><code>tools/run-telemetry-tracker.py<\/code> is the development HTTP entrypoint for Uvicorn plus optional UDP listener startup.<\/li>\n<li><code>tools/capture-data-out.py<\/code>, <code>tools/capture-session.py<\/code>, and <code>tools/parse-data-out.py<\/code> are raw FH Data Out capture/session/parse utilities.<\/li>\n<li><code>tools/maintain-telemetry-db.py<\/code> prunes eligible non-race samples, checkpoints WAL, and optionally VACUUMs the SQLite database.<\/li>\n<\/ul>\n<h2 id=\"neighbouring-systems\">Neighbouring Systems<\/h2>\n<ul>\n<li>Web Dashboard (<code>web/telemetry-tracker/<\/code>) consumes these REST/SSE APIs, mounted static assets, and pywebview bridge selections.<\/li>\n<li>Feedback Worker receives reports submitted by the backend feedback client; backend owns local validation, diagnostics collection, queueing, and retry.<\/li>\n<li>FH6 Map Tile Converter is called from the world-map cache path; backend owns cache status, settings, tile serving, and converter invocation.<\/li>\n<li>Release, CI, and Packaging owns PyInstaller/Inno/metadata packaging around the backend launcher, requirements, and smoke checks.<\/li>\n<\/ul>\n<h2 id=\"key-internal-files\">Key Internal Files<\/h2>\n<ul>\n<li><code>telemetry_tracker/storage.py<\/code>: SQLite schema, migrations, settings, sessions, laps, samples, track profiles, world-map records, feedback queue, and maintenance helpers.<\/li>\n<li><code>telemetry_tracker/udp_listener.py<\/code>: async UDP socket lifecycle, packet-size validation, status events, and packet handler dispatch.<\/li>\n<li><code>telemetry_tracker/packet_bridge.py<\/code> and <code>telemetry_tracker/data_out/<\/code>: FH Data Out packet schema, decoding, test encoding, raw packet iteration, capture summaries, and CSV/artifact writing.<\/li>\n<li><code>telemetry_tracker/capture.py<\/code>, <code>lap_detection.py<\/code>, <code>lap_quality.py<\/code>, <code>ingest.py<\/code>: live capture state, auto/manual lap/session handling, quality decisions, and recent-sample ingestion.<\/li>\n<li><code>telemetry_tracker/analysis.py<\/code>, <code>comparison.py<\/code>, <code>track_matcher.py<\/code>, <code>track_profiles.py<\/code>, <code>track_assets.py<\/code>: lap analysis, reference/ghost/delta data, track matching, route signatures, and uploaded track assets.<\/li>\n<li><code>telemetry_tracker/export.py<\/code>, <code>replay.py<\/code>, <code>feedback.py<\/code>, <code>diagnostics.py<\/code>, <code>app_updates.py<\/code>, <code>world_map.py<\/code>: export/import jobs, raw replay, feedback, diagnostics, update checks, and map tile cache support.<\/li>\n<\/ul>\n<h2 id=\"maintenance-notes\">Maintenance Notes<\/h2>\n<ul>\n<li>Keep this page focused on stable ownership, entrypoints, and contracts.<\/li>\n<li>Use <code>routing.md<\/code> for symptom/search routing details.<\/li>\n<li>Use the focused <code>tests/test_tracker_*.py<\/code> or <code>tests/test_capture_tool.py<\/code> file that matches the touched backend module or tool; broad backend changes normally route through <code>pytest tests<\/code>.<\/li>\n<\/ul>",

      "html": "<h2 id=\"purpose\">Purpose<\/h2>\n<p>Cloudflare Worker backend and runbook for user-initiated anonymous feedback reports. It accepts <code>POST /v1/reports<\/code>, validates the Forza report schema, enforces D1-backed idempotency and rate limits, and creates private GitHub triage issues through a dedicated GitHub App.<\/p>\n<h2 id=\"owned-paths\">Owned Paths<\/h2>\n<ul>\n<li>tools/feedback_worker/<\/li>\n<li>docs/feedback<em>reporting<\/em>setup.md<\/li>\n<li>docs/feedback<em>reporting<\/em>design_handoff.md<\/li>\n<\/ul>\n<h2 id=\"entrypoints\">Entrypoints<\/h2>\n<ul>\n<li><code>tools/feedback_worker/src/index.ts<\/code>: Worker fetch handler, <code>GET /health<\/code>, <code>POST /v1/reports<\/code>, body size checks, report state transitions, HMAC reporter/IP hashes, fixed-window rate limits, and D1 idempotency.<\/li>\n<li><code>tools/feedback_worker/src/schema.ts<\/code>: accepted report categories, <code>FTT-[A-Z2-7]{8}<\/code> report refs, GUID reporter IDs, description limits, diagnostics log cap, and timestamp validation.<\/li>\n<li><code>tools/feedback_worker/src/githubApp.ts<\/code>: GitHub App JWT/token exchange, exact report-ref search, private issue creation, category labels, label fallback, and issue-body redaction.<\/li>\n<li><code>tools/feedback_worker/src/rateLimit.ts<\/code>: D1 fixed-window counter update.<\/li>\n<li><code>tools/feedback_worker/migrations/0001_feedback_state.sql<\/code>: <code>reports<\/code> and <code>rate_limits<\/code> tables.<\/li>\n<li><code>tools/feedback_worker/wrangler.toml<\/code>: Worker name, D1 binding, GitHub repo vars, body and rate-limit defaults.<\/li>\n<li><code>tools/feedback_worker/test/worker.test.ts<\/code>: executable coverage for schema rejection, idempotency, failed-row retry, rate limits, label fallback, JWT key formats, and redaction.<\/li>\n<\/ul>\n<h2 id=\"neighbouring-systems\">Neighbouring Systems<\/h2>\n<ul>\n<li>Desktop Backend builds and submits reports through local FastAPI; the Svelte UI should not call Cloudflare directly.<\/li>\n<li>Desktop Backend also owns diagnostics collection, sanitisation before submission, and the local retry outbox when the endpoint is unavailable.<\/li>\n<li>Web Dashboard owns the Send Feedback modal, category selection, opt-out diagnostics toggle, and sent/queued/error toast flow.<\/li>\n<li>Release CI Packaging controls when packaged builds receive the production <code>https://forza-telemetry-feedback.cvdp.workers.dev/v1/reports<\/code> endpoint.<\/li>\n<li>The private <code>seevydeepy/forza-telemetry-feedback<\/code> repository is the triage target. User feedback must not be filed in the public tracker repository.<\/li>\n<\/ul>\n<h2 id=\"maintenance-notes\">Maintenance Notes<\/h2>\n<ul>\n<li>Keep Worker changes paired with <code>npm test<\/code> and <code>npm run typecheck<\/code> from <code>tools/feedback_worker<\/code>.<\/li>\n<li>Keep deployment and privacy claims aligned with <code>docs/feedback_reporting_setup.md<\/code>; do not document unprovisioned buckets, attachments, screenshots, or telemetry uploads.<\/li>\n<li>Treat raw IPs, reporter UUIDs, credentials, local user paths, emails, and tokens as privacy-sensitive. The Worker should only persist HMAC-derived identifiers and redacted issue text.<\/li>\n<\/ul>",

      "html": "<h2 id=\"purpose\">Purpose<\/h2>\n<p>Windows-only .NET CLI that inspects and converts FH6 <code>.swatchbin<\/code> map tile archives into PNG tile folders plus a JSON manifest for the local world-map cache.<\/p>\n<h2 id=\"owned-paths\">Owned Paths<\/h2>\n<ul>\n<li>tools/fh6-map-tile-converter/<\/li>\n<\/ul>\n<h2 id=\"entrypoints\">Entrypoints<\/h2>\n<ul>\n<li><code>tools/fh6-map-tile-converter/Program.cs<\/code> exposes <code>forza-map-tile-converter inspect-zip --input &lt;Map_Brio_Season.zip&gt;<\/code> for archive inspection.<\/li>\n<li><code>tools/fh6-map-tile-converter/Program.cs<\/code> exposes <code>forza-map-tile-converter convert-zip --input &lt;Map_Brio_Season.zip&gt; --output &lt;dir&gt; --format png --manifest &lt;manifest.json&gt;<\/code> for cache generation.<\/li>\n<li><code>tools/fh6-map-tile-converter/ForzaTelemetryTracker.FH6MapTileConverter.csproj<\/code> builds the <code>forza-map-tile-converter<\/code> executable for <code>net9.0-windows<\/code>.<\/li>\n<\/ul>\n<h2 id=\"neighbouring-systems\">Neighbouring Systems<\/h2>\n<ul>\n<li>Desktop backend world-map cache code locates the converter executable and serves generated tile sets.<\/li>\n<li>Desktop release packaging publishes the converter into <code>bin/map-converter/<\/code> and smoke tests assert it is present.<\/li>\n<li>Web dashboard world-map overlay consumes the tile-set manifest and PNG tile URLs; it should not parse <code>.swatchbin<\/code> files directly.<\/li>\n<li>Third-party notices cover the vendored ForzaTechStudio parsing code under this solution.<\/li>\n<\/ul>\n<h2 id=\"maintenance-notes\">Maintenance Notes<\/h2>\n<ul>\n<li>Tile archive entries must be named <code>&lt;z&gt;-&lt;row&gt;-&lt;column&gt;.swatchbin<\/code>; the converter emits manifest paths as <code>&lt;z&gt;/&lt;x&gt;/&lt;y&gt;.png<\/code> using <code>fh6-row-column-v1<\/code>.<\/li>\n<li>The PNG path supports PC swatchbins and rejects Durango/Xbox tiled swatchbins.<\/li>\n<li>BCn formats are decoded through <code>BCnEncoder.Net<\/code>; uncompressed RGBA/BGRA paths are handled locally.<\/li>\n<li>Keep changes inside <code>tools/fh6-map-tile-converter/<\/code> unless the backend, packaging, or web manifest contract also changes.<\/li>\n<\/ul>",

      "html": "<h2 id=\"purpose\">Purpose<\/h2>\n<p>Root project documentation, community metadata, support, privacy, security, funding, issue templates, design plans, and preview assets not owned by a narrower runtime or release bundle.<\/p>\n<h2 id=\"owned-paths\">Owned Paths<\/h2>\n<ul>\n<li>README.md<\/li>\n<li>CONTRIBUTING.md<\/li>\n<li>SUPPORT.md<\/li>\n<li>PRIVACY.md<\/li>\n<li>SECURITY.md<\/li>\n<li>CODE<em>OF<\/em>CONDUCT.md<\/li>\n<li>LICENSE<\/li>\n<li>.github/FUNDING.yml<\/li>\n<li>.github/PULL<em>REQUEST<\/em>TEMPLATE.md<\/li>\n<li>.github/ISSUE_TEMPLATE/<\/li>\n<li>docs/assets/<\/li>\n<li>docs/superpowers/<\/li>\n<\/ul>\n<h2 id=\"entrypoints\">Entrypoints<\/h2>\n<ul>\n<li><code>README.md<\/code> is the public project landing page. It states the local-first Windows desktop purpose, preview GIFs, install flow, Data Out setup, privacy summary, developer commands, support routes, licence, and Ko-fi link.<\/li>\n<li><code>CONTRIBUTING.md<\/code> is the maintainer/contributor entrypoint for local setup, validation commands, pull request expectations, release-lock regeneration, and forbidden artefacts.<\/li>\n<li><code>SUPPORT.md<\/code>, <code>PRIVACY.md<\/code>, and <code>SECURITY.md<\/code> are the public support, data-handling, and vulnerability-reporting entrypoints.<\/li>\n<li><code>.github/PULL_REQUEST_TEMPLATE.md<\/code> and <code>.github/ISSUE_TEMPLATE/<\/code> are the GitHub intake surfaces for validation evidence, public-release impact checks, bug reports, feature requests, support links, and security routing.<\/li>\n<li><code>docs/assets/<\/code> holds README preview media. <code>docs/superpowers/<\/code> holds historical plans and specs for agentic implementation work.<\/li>\n<\/ul>\n<h2 id=\"neighbouring-systems\">Neighbouring Systems<\/h2>\n<ul>\n<li><code>desktop-backend<\/code>: owns the FastAPI/Python runtime, local SQLite storage, Data Out capture, local feedback client/outbox, update-check implementation, and world-map status described by the public docs.<\/li>\n<li><code>web-dashboard<\/code>: owns the Svelte UI surfaces referenced by docs, including feedback, settings, import/export, replay, route review, and dashboard behaviour.<\/li>\n<li><code>feedback-worker<\/code>: owns Cloudflare Worker, D1, GitHub App, private triage repository, HMAC/rate-limit, and feedback-reporting runbook details; project-docs only summarises public user-facing behaviour.<\/li>\n<li><code>release-ci-packaging<\/code>: owns installer packaging, release workflow, dependency locks, third-party notices, licences folder, release attestations, and <code>docs/desktop-release.md<\/code>.<\/li>\n<li><code>fh6-map-tile-converter<\/code>: owns map tile conversion internals; project-docs only documents the user-facing install-folder and map-cache privacy expectations.<\/li>\n<\/ul>\n<h2 id=\"contracts\">Contracts<\/h2>\n<ul>\n<li>Public docs must keep the project framed as an unofficial community tool unaffiliated with Microsoft, Xbox Game Studios, Turn 10 Studios, Playground Games, or the Forza franchise owners.<\/li>\n<li>Public docs must preserve the local-first privacy contract: no automatic analytics, crash reporting, tracking pixels, advertising SDKs, user accounts, or background telemetry upload behaviour.<\/li>\n<li>Support and issue intake must steer private diagnostics, security reports, telemetry databases, local game files, generated map caches, credentials, and private keys away from public issues unless a maintainer explicitly asks for a redacted sample.<\/li>\n<li>README release/install wording should stay aligned with the Windows installer path, unsigned SmartScreen warning, GitHub Releases update check, and release/packaging ownership.<\/li>\n<\/ul>\n<h2 id=\"maintenance-notes\">Maintenance Notes<\/h2>\n<ul>\n<li>Keep this page focused on stable ownership, entrypoints, and contracts.<\/li>\n<li>Use <code>routing.md<\/code> for symptom/search routing details.<\/li>\n<\/ul>",

      "html": "<h2 id=\"purpose\">Purpose<\/h2>\n<p>Build, verify, and publish the unsigned Windows desktop installer. This bundle owns GitHub CI/release workflows, Dependabot coverage, PyInstaller/Inno Setup packaging, release dependency locks, third-party notices, licence copies, packaged-app smoke tooling, and the maintainer release guide.<\/p>\n<h2 id=\"owned-paths\">Owned Paths<\/h2>\n<ul>\n<li>.github/workflows/<\/li>\n<li>.github/dependabot.yml<\/li>\n<li>packaging/<\/li>\n<li>tools/build-desktop-release.ps1<\/li>\n<li>tools/smoke-desktop-package.py<\/li>\n<li>requirements-telemetry-release-lock.txt<\/li>\n<li>THIRD<em>PARTY<\/em>NOTICES.md<\/li>\n<li>licenses/<\/li>\n<li>docs/desktop-release.md<\/li>\n<\/ul>\n<h2 id=\"entrypoints\">Entrypoints<\/h2>\n<ul>\n<li><code>.github/workflows/ci.yml<\/code> runs Windows CI for Python tests/audit, frontend tests/build/audit, and .NET map-converter restore/audit/build.<\/li>\n<li><code>.github/workflows/desktop-release.yml<\/code> is tag-triggered for <code>vX.Y.Z<\/code>, builds the installer, creates the checksum, generates/verifies GitHub Artifact Attestations, and publishes the GitHub Release.<\/li>\n<li><code>tools/build-desktop-release.ps1<\/code> is the local and CI release orchestrator: writes <code>build/release-metadata.json<\/code>, builds frontend assets, installs locked Python dependencies, runs tests, publishes the map converter, runs PyInstaller, runs Inno Setup, and optionally smokes the packaged app.<\/li>\n<li><code>packaging/pyinstaller/forza-telemetry-tracker.spec<\/code> defines bundled frontend, resources, map converter output, licence/notices, and release metadata.<\/li>\n<li><code>packaging/installer/forza-telemetry-tracker.iss<\/code> defines the per-user Inno Setup installer, shortcuts, WebView2 prerequisite handling, and installer output name.<\/li>\n<li><code>tools/smoke-desktop-package.py<\/code> launches the built package with smoke-only environment overrides and checks the GUI subsystem, bundled converter, <code>/api/status<\/code>, <code>/<\/code>, and <code>/events<\/code>.<\/li>\n<li><code>docs/desktop-release.md<\/code> is the maintainer/user release-process reference.<\/li>\n<\/ul>\n<h2 id=\"neighbouring-systems\">Neighbouring Systems<\/h2>\n<ul>\n<li>Desktop Backend provides the packaged launcher, <code>/api/status<\/code>, <code>/events<\/code>, metadata/update logic, user-data paths, and smoke HTTP mode.<\/li>\n<li>Web Dashboard provides the frontend build output that PyInstaller embeds.<\/li>\n<li>FH6 Map Tile Converter provides the .NET converter source; release tooling publishes and packages its Windows output.<\/li>\n<li>Feedback Worker is wired into stable builds through the release metadata feedback endpoint.<\/li>\n<li>Project Docs owns broad README/support/community pages; release-specific installer, checksum, attestation, WebView2, and validation guidance lives here.<\/li>\n<\/ul>\n<h2 id=\"maintenance-notes\">Maintenance Notes<\/h2>\n<ul>\n<li>Stable releases are SemVer tag driven; branch pushes do not exercise the publish path.<\/li>\n<li>The installer is unsigned for Windows Authenticode. GitHub Artifact Attestations and SHA-256 checksums prove provenance/integrity, not SmartScreen reputation.<\/li>\n<li>Keep dependency-lock changes aligned with the Windows/Python 3.12 <code>uv pip compile<\/code> command documented in <code>docs/desktop-release.md<\/code>.<\/li>\n<\/ul>",

  }

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[ch]));
  }

  function renderList() {
    const needle = search.value.trim().toLowerCase();
    const selectedType = typeFilter.value;
    const { path: activePath } = parseHash();
    const filtered = docs.filter((doc) => {
      return (!selectedType || doc.type === selectedType) && (!needle || doc.search.includes(needle));
    });
    docList.innerHTML = filtered.map((doc) => `
      <a class="doc-link ${doc.path === activePath ? "active" : ""}" href="${docHref(doc.path)}">
        <strong>${escapeHtml(doc.title)}</strong>
        <span>${escapeHtml(doc.path)} - ${escapeHtml(doc.type)}</span>
      </a>
    `).join("") || `<p class="empty">No matching wiki pages.</p>`;
  }

  function linkPills(paths, emptyText) {
    if (!paths || paths.length === 0) return `<p class="empty">${escapeHtml(emptyText)}</p>`;
    return `<div class="link-row">${paths.map((path) => {
      const doc = docsByPath.get(path);
      const label = doc ? doc.title : path;
      return `<a class="pill" href="${docHref(path)}">${escapeHtml(label)}</a>`;
    }).join("")}</div>`;
  }

  function listValue(value) {
    if (Array.isArray(value)) return value.filter((item) => String(item || "").trim());
    if (typeof value === "string" && value.trim()) return [value.trim()];
    return [];
  }

  function renderRouteList(label, values) {
    if (!values.length) return "";
    return `
      <section>
        <strong>${escapeHtml(label)}</strong>
        <ul class="route-list">
          ${values.map((value) => `<li><code>${escapeHtml(value)}</code></li>`).join("")}
        </ul>
      </section>
    `;
  }

  function renderRouting(metadata) {
    const sections = [
      renderRouteList("Start here", listValue(metadata.routing_primary)),
      renderRouteList("Usually also inspect", listValue(metadata.routing_related)),
      renderRouteList("Keywords", listValue(metadata.routing_keywords)),
      renderRouteList("Runbooks / references", listValue(metadata.routing_runbooks))
    ].filter(Boolean);
    if (!sections.length) return "";
    return `
      <section class="routing-panel" aria-label="Agent routing">
        <h3>Agent routing</h3>
        <div class="routing-grid">${sections.join("")}</div>
      </section>
    `;
  }

  function renderArticle() {
    const { path, anchor } = parseHash();
    const doc = docsByPath.get(path) || docsByPath.get("index.md") || docs[0];
    if (!doc) {
      article.innerHTML = `<h2>No wiki documents found</h2>`;
      return;
    }
    document.title = `${doc.title} - ${bundle.name}`;
    const tagBadges = (doc.tags || []).map((tag) => `<span class="badge">#${escapeHtml(tag)}</span>`).join("");
    const metadata = Object.entries(doc.metadata || {})
      .filter(([key]) => !["title", "description", "tags"].includes(key) && !key.startsWith("routing_"))
      .map(([key, value]) => `<span class="badge">${escapeHtml(key)}: ${escapeHtml(Array.isArray(value) ? value.join(", ") : value)}</span>`)
      .join("");
    article.innerHTML = `
      <header class="article-header">
        <div class="badges"><span class="badge">${escapeHtml(doc.type)}</span>${tagBadges}${metadata}</div>
        <h2>${escapeHtml(doc.title)}</h2>
        ${doc.description ? `<p>${escapeHtml(doc.description)}</p>` : ""}
        <div class="source-link">Source path: ${escapeHtml(doc.path)}</div>
        ${renderRouting(doc.metadata || {})}
      </header>
      <section class="article-body">${doc.html}</section>
      <section class="relationships" aria-label="OKF relationships">
        <h3>Links from this page</h3>
        ${linkPills(doc.outgoing, "No internal OKF links from this page.")}
        <h3>Cited by</h3>
        ${linkPills(bundle.backlinks[doc.path] || [], "No other wiki page links here yet.")}
      </section>
    `;
    renderList();
    if (anchor) {
      requestAnimationFrame(() => {
        const target = document.getElementById(anchor);
        if (target) target.scrollIntoView({ block: "start" });
      });
    }
  }

  document.addEventListener("click", (event) => {
    const link = event.target.closest("a[data-doc-link]");
    if (!link) return;
    event.preventDefault();
    window.location.hash = docHref(link.dataset.docLink, link.dataset.docAnchor || "");
  });
  search.addEventListener("input", renderList);
  typeFilter.addEventListener("change", renderList);
  window.addEventListener("hashchange", renderArticle);
  renderList();
  renderArticle();
})();
</script>
</body>
</html>
