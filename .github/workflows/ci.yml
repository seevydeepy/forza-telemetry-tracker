name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python:
    name: Python tests and dependency audit
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-telemetry-tracker.txt
            requirements-telemetry-test.txt
            requirements-telemetry-desktop.txt
            requirements-telemetry-release-lock.txt

      - name: Install locked Python release dependencies
        run: python -m pip install -r requirements-telemetry-release-lock.txt

      - name: Run Python tests
        run: python -m pytest

      - name: Audit Python dependencies
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r requirements-telemetry-desktop.txt -r requirements-telemetry-test.txt

  frontend:
    name: Frontend tests and build
    runs-on: windows-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: web/telemetry-tracker

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/telemetry-tracker/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  map-converter:
    name: Map converter build and dependency audit
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore map converter
        run: dotnet restore tools/fh6-map-tile-converter/ForzaTelemetryTracker.FH6MapTileConverter.csproj

      - name: Audit map converter dependencies
        run: dotnet list tools/fh6-map-tile-converter/ForzaTelemetryTracker.FH6MapTileConverter.csproj package --vulnerable --include-transitive

      - name: Build map converter
        run: dotnet build tools/fh6-map-tile-converter/ForzaTelemetryTracker.FH6MapTileConverter.csproj --configuration Release --no-restore
