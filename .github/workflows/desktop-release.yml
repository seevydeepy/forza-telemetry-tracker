name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  # Opt into GitHub's upcoming Node 24 JavaScript action runtime before it becomes the default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build unsigned Windows desktop package
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Validate SemVer tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tags must match vX.Y.Z. Got: $tag"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($Matches.version)" >> $env:GITHUB_OUTPUT
          "release_date=$((Get-Date).ToUniversalTime().ToString('yyyy-MM-dd'))" >> $env:GITHUB_OUTPUT

      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-telemetry-tracker.txt
            requirements-telemetry-test.txt
            requirements-telemetry-desktop.txt
            requirements-telemetry-release-lock.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/telemetry-tracker/package-lock.json

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download WebView2 standalone installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Invoke-WebRequest `
            -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile "build\MicrosoftEdgeWebView2RuntimeInstallerX64.exe"

      - name: Build unsigned desktop package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tools\build-desktop-release.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -Repository "${{ github.repository }}" `
            -Channel stable `
            -ReleaseDate "${{ steps.version.outputs.release_date }}" `
            -GitSha "${{ github.sha }}" `
            -FeedbackEndpoint "https://forza-telemetry-feedback.cvdp.workers.dev/v1/reports" `
            -WebView2StandaloneInstaller "$((Resolve-Path build\MicrosoftEdgeWebView2RuntimeInstallerX64.exe).Path)"

      - name: Create installer checksum
        id: assets
        shell: pwsh
        run: |
          $installer = "dist\installer\ForzaTelemetryTrackerSetup-v${{ steps.version.outputs.version }}-x64.exe"
          $hash = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksum = "$installer.sha256"
          "$hash  $(Split-Path -Leaf $installer)" | Set-Content -Path $checksum -Encoding ascii
          "installer=$installer" >> $env:GITHUB_OUTPUT
          "checksum=$checksum" >> $env:GITHUB_OUTPUT

      - name: Generate release asset attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ steps.assets.outputs.installer }}
            ${{ steps.assets.outputs.checksum }}

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: desktop-release-assets
          path: |
            ${{ steps.assets.outputs.installer }}
            ${{ steps.assets.outputs.checksum }}
          if-no-files-found: error

  release:
    name: Publish stable GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: desktop-release-assets
          path: release-assets

      - name: Verify downloaded release assets
        id: downloaded_assets
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          installer="$(find release-assets -type f -name "ForzaTelemetryTrackerSetup-v${tag_version}-x64.exe" -print -quit)"
          if [[ -z "${installer}" ]]; then
            echo "Installer asset not found for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          checksum="${installer}.sha256"
          if [[ ! -f "${checksum}" ]]; then
            echo "Checksum asset not found: ${checksum}" >&2
            exit 1
          fi
          (
            cd "$(dirname "${installer}")"
            sha256sum -c "$(basename "${checksum}")"
          )
          {
            echo "installer=${installer}"
            echo "checksum=${checksum}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify release asset attestations
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          signer_workflow="${GITHUB_REPOSITORY}/.github/workflows/desktop-release.yml"
          source_ref="refs/tags/${GITHUB_REF_NAME}"
          gh attestation verify "${{ steps.downloaded_assets.outputs.installer }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${signer_workflow}" \
            --source-ref "${source_ref}" \
            --deny-self-hosted-runners
          gh attestation verify "${{ steps.downloaded_assets.outputs.checksum }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${signer_workflow}" \
            --source-ref "${source_ref}" \
            --deny-self-hosted-runners

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cat > release-notes.md <<EOF
          Stable desktop release ${TAG_NAME}

          - Unsigned Windows installer.
          - SHA-256 checksum is attached for verification.
          - GitHub Artifact Attestations are published for the installer and checksum.
          - Verify installer provenance with:
            gh attestation verify ForzaTelemetryTrackerSetup-${TAG_NAME}-x64.exe --repo ${GITHUB_REPOSITORY} --signer-workflow ${GITHUB_REPOSITORY}/.github/workflows/desktop-release.yml --source-ref refs/tags/${TAG_NAME} --deny-self-hosted-runners
          - Source commit: ${GITHUB_SHA}
          EOF
          gh release create "${TAG_NAME}" \
            "${{ steps.downloaded_assets.outputs.installer }}" \
            "${{ steps.downloaded_assets.outputs.checksum }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG_NAME}" \
            --notes-file release-notes.md \
            --verify-tag
